<section class="mock-login">
  <mat-card class="mock-login__card">
    <mat-card-header>
      <mat-card-title>Mock login</mat-card-title>
      <mat-card-subtitle>Select one of the seeded users to enter DunFlow.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" class="mock-login__form" (ngSubmit)="onSubmit()">
        <app-select
          label="Select user"
          [options]="usersOptions"
          [control]="userControl"
        ></app-select>

        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">
          Login
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
